# Runs the test suite, then publishes the package to GitHub Packages when a
# GitHub Release is created. See:
# https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish to GitHub Packages

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # Scope must match the package's @owner so the GitHub Packages
          # registry accepts the publish.
          registry-url: https://npm.pkg.github.com
          scope: "@joestump"
      - run: npm ci
      - run: npm publish
        env:
          # GITHUB_TOKEN (with packages: write above) authenticates the publish;
          # no separate npm token/secret is needed.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
